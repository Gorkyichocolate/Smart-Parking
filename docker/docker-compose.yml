services:
  postgres-auth:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: auth_service_user
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    networks:
      - smart-parking

  postgres-parking:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: parking_service_user
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: parking_db
    ports:
      - "5434:5432"
    networks:
      - smart-parking

  postgres-payment:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: payment_service_user
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: payment_service_db
    ports:
      - "5432:5432"
    networks:
      - smart-parking

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - smart-parking

  auth-service:
    build:
      context: ../..
      dockerfile: Smart-Parking/services/auth-service/Dockerfile
    restart: on-failure
    environment:
      - AUTH_DATABASE_URL=postgres://auth_service_user:123456@postgres-auth:5432/auth_db?sslmode=disable
    ports:
      - "50051:50051"
    depends_on:
      - postgres-auth
    networks:
      - smart-parking

  parking-service:
    build:
      context: ../..
      dockerfile: Smart-Parking/services/parking-service/Dockerfile
    restart: on-failure
    environment:
      - PARKING_DATABASE_URL=postgres://parking_service_user:123456@postgres-parking:5432/parking_db?sslmode=disable
    ports:
      - "50053:50053"
    depends_on:
      - postgres-parking
    networks:
      - smart-parking

  payment-service:
    build:
      context: ../..
      dockerfile: Smart-Parking/services/payment-service/Dockerfile
    restart: on-failure
    environment:
      - PAYMENT_DATABASE_URL=postgres://payment_service_user:123456@postgres-payment:5432/payment_service_db?sslmode=disable
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "50052:50052"
    depends_on:
      - postgres-payment
      - rabbitmq
    networks:
      - smart-parking

  notification-service:
    build:
      context: ../..
      dockerfile: Smart-Parking/services/notification-service/Dockerfile
    restart: on-failure
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - rabbitmq
    networks:
      - smart-parking

  api-gateway:
    build:
      context: ../..
      dockerfile: Smart-Parking/services/apigateway/Dockerfile
    restart: on-failure
    environment:
      - API_GATEWAY_PORT=8080
      - AUTH_SERVICE_ADDR=auth-service:50051
      - PARKING_SERVICE_ADDR=parking-service:50053
      - PAYMENT_SERVICE_ADDR=payment-service:50052
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - parking-service
      - payment-service
    networks:
      - smart-parking

networks:
  smart-parking:
    driver: bridge
