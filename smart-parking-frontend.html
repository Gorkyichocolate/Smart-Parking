<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking 🅿️</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --card: #12122a;
            --border: #2a2a4a;
            --accent: #00d4ff;
            --green: #00ff88;
            --red: #ff4455;
            --yellow: #ffcc00;
            --text: #e0e0ff;
            --text2: #8888aa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            min-height: 100vh;
        }
        
        /* HEADER */
        .header {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 24px; }
        .header h1 span { color: var(--accent); }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-info .role { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .btn { 
            padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: 600; font-size: 14px; transition: all 0.2s;
        }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-accent:hover { background: #00b4d8; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-outline:hover { background: rgba(0,212,255,0.1); }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        
        /* LAYOUT */
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .card h2 .icon { font-size: 24px; }
        
        /* FORM */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); 
            border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: border 0.2s;
        }
        .form-group input:focus { border-color: var(--accent); }
        
        /* PARKING GRID */
        .parking-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
        .spot { 
            padding: 12px 8px; border-radius: 8px; text-align: center; font-size: 11px; 
            cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
        }
        .spot.free { background: rgba(0,255,136,0.1); border-color: var(--green); color: var(--green); }
        .spot.occupied { background: rgba(255,68,85,0.1); border-color: var(--red); color: var(--red); }
        .spot.reserved { background: rgba(255,204,0,0.1); border-color: var(--yellow); color: var(--yellow); }
        .spot:hover { transform: scale(1.05); }
        .spot.selected { box-shadow: 0 0 15px var(--accent); border-color: var(--accent); }
        
        /* BOOKINGS TABLE */
        table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
        th { text-align: left; color: var(--text2); padding: 8px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
        td { padding: 10px 8px; border-bottom: 1px solid var(--border); }
        .status { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .status.active { background: rgba(0,255,136,0.2); color: var(--green); }
        .status.completed { background: rgba(0,212,255,0.2); color: var(--accent); }
        .status.cancelled { background: rgba(255,68,85,0.2); color: var(--red); }
        .status.pending { background: rgba(255,204,0,0.2); color: var(--yellow); }
        
        /* TABS */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab { 
            padding: 8px 20px; border: 1px solid var(--border); background: transparent; 
            color: var(--text2); border-radius: 8px 8px 0 0; cursor: pointer; font-size: 13px;
        }
        .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        
        /* MODAL */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; width: 400px; max-width: 90%; }
        .modal h2 { margin-bottom: 20px; color: var(--accent); }
        
        /* TOAST */
        .toast { 
            position: fixed; bottom: 20px; right: 20px; padding: 14px 24px; border-radius: 10px; 
            color: #000; font-weight: 600; z-index: 300; animation: slideIn 0.3s ease;
        }
        .toast.success { background: var(--green); }
        .toast.error { background: var(--red); color: #fff; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .hidden { display: none; }
        .mb-20 { margin-bottom: 20px; }
        .text-center { text-align: center; }
        .text-muted { color: var(--text2); font-size: 13px; }
    </style>
</head>
<body>

<div class="header">
    <h1>🅿️ <span>Smart Parking</span></h1>
    <div class="user-info" id="userInfo">
        <span class="text-muted">Не авторизован</span>
        <button class="btn btn-outline btn-sm" onclick="showAuthModal()">Войти</button>
    </div>
</div>

<div class="container">
    <!-- TABS -->
    <div class="tabs" id="tabs" style="display:none">
        <button class="tab active" onclick="switchTab('parking')">🅿️ Парковки</button>
        <button class="tab" onclick="switchTab('bookings')">📅 Мои бронирования</button>
        <button class="tab" onclick="switchTab('payments')">💰 Платежи</button>
    </div>

    <!-- PARKING TAB -->
    <div id="tab-parking" class="hidden">
        <div class="grid">
            <div class="card" id="zonesCard">
                <h2><span class="icon">📍</span> Зоны парковки</h2>
                <div id="zonesList" class="text-muted">Загрузка...</div>
            </div>
            <div class="card" id="spotsCard">
                <h2><span class="icon">🅿️</span> Парковочные места</h2>
                <div id="spotsList" class="text-muted">Выберите зону</div>
            </div>
        </div>
    </div>

    <!-- BOOKINGS TAB -->
    <div id="tab-bookings" class="hidden">
        <div class="card">
            <h2><span class="icon">📅</span> Мои бронирования</h2>
            <table id="bookingsTable">
                <thead><tr><th>ID</th><th>Место</th><th>Начало</th><th>Конец</th><th>Сумма</th><th>Статус</th><th></th></tr></thead>
                <tbody id="bookingsBody"></tbody>
            </table>
        </div>
    </div>

    <!-- PAYMENTS TAB -->
    <div id="tab-payments" class="hidden">
        <div class="card">
            <h2><span class="icon">💰</span> Платежи</h2>
            <table id="paymentsTable">
                <thead><tr><th>ID</th><th>Бронь</th><th>Сумма</th><th>Метод</th><th>Статус</th><th>Дата</th></tr></thead>
                <tbody id="paymentsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="authModal">
    <div class="modal">
        <h2>🔐 Вход / Регистрация</h2>
        <div class="form-group"><label>Email</label><input type="email" id="authEmail" placeholder="your@email.com"></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="authPassword" placeholder="••••••"></div>
        <div class="form-group"><label>Имя</label><input type="text" id="authName" placeholder="Ваше имя"></div>
        <div style="display:flex;gap:10px;margin-top:20px">
            <button class="btn btn-accent" style="flex:1" onclick="authRegister()">Регистрация</button>
            <button class="btn btn-outline" style="flex:1" onclick="authLogin()">Войти</button>
        </div>
        <button class="btn btn-outline" style="width:100%;margin-top:10px" onclick="closeAuthModal()">Отмена</button>
    </div>
</div>

<!-- BOOKING MODAL -->
<div class="modal-overlay" id="bookingModal">
    <div class="modal">
        <h2>📅 Забронировать место</h2>
        <div class="form-group"><label>Место</label><input type="text" id="bookingSpot" readonly></div>
        <div class="form-group"><label>Цена за час</label><input type="text" id="bookingPrice" readonly></div>
        <div class="form-group"><label>Начало</label><input type="datetime-local" id="bookingStart"></div>
        <div class="form-group"><label>Конец</label><input type="datetime-local" id="bookingEnd"></div>
        <div class="form-group"><label>Итого</label><input type="text" id="bookingTotal" readonly></div>
        <button class="btn btn-accent" style="width:100%;margin-top:10px" onclick="confirmBooking()">Забронировать</button>
        <button class="btn btn-outline" style="width:100%;margin-top:5px" onclick="closeBookingModal()">Отмена</button>
    </div>
</div>

<script>
const API = 'http://localhost:8080';
let currentUser = null;
let selectedSpot = null;
let selectedZone = null;

// ========== TOAST ==========
function toast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// ========== AUTH ==========
function showAuthModal() { document.getElementById('authModal').classList.add('show'); }
function closeAuthModal() { document.getElementById('authModal').classList.remove('show'); }

async function authRegister() {
    console.log("Register clicked");
    const r = await fetch(API + '/api/auth/register', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            email: document.getElementById('authEmail').value,
            password: document.getElementById('authPassword').value,
            full_name: document.getElementById('authName').value,
            role: 'driver'
        })
    });
    const d = await r.json();
    if (d.user_id) { 
        toast('Регистрация успешна! Теперь войдите.', 'success'); 
        document.getElementById('authName').value = '';
    } else { toast(d.error || 'Ошибка', 'error'); }
}

async function authLogin() {
    const r = await fetch(API + '/api/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            email: document.getElementById('authEmail').value,
            password: document.getElementById('authPassword').value
        })
    });
    const d = await r.json();
    if (d.access_token) {
        currentUser = { 
            email: document.getElementById('authEmail').value, 
            token: d.access_token 
        };
        try {
            const payload = JSON.parse(atob(d.access_token.split('.')[1]));
            currentUser.id = payload.user_id;
            currentUser.role = payload.role;
            currentUser.name = payload.full_name;
        } catch(e) {}
        updateUI();
        closeAuthModal();
        loadZones();
        toast('Вход выполнен!', 'success');
    } else { toast(d.error || 'Неверный логин/пароль', 'error'); }
}

function logout() {
    currentUser = null;
    updateUI();
    toast('Вы вышли');
}

function updateUI() {
    if (currentUser) {
        document.getElementById('userInfo').innerHTML = `
            <span>👤 ${currentUser.name || currentUser.email}</span>
            <span class="role">${currentUser.role || 'driver'}</span>
            <button class="btn btn-outline btn-sm" onclick="logout()">Выйти</button>
        `;
        document.getElementById('tabs').style.display = 'flex';
        switchTab('parking');
    } else {
        document.getElementById('userInfo').innerHTML = `
            <span class="text-muted">Не авторизован</span>
            <button class="btn btn-outline btn-sm" onclick="showAuthModal()">Войти</button>
        `;
        document.getElementById('tabs').style.display = 'none';
        document.querySelectorAll('#tab-parking, #tab-bookings, #tab-payments').forEach(el => el.classList.add('hidden'));
    }
}

// ========== TABS ==========
function switchTab(tab) {
    if (!event) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-parking').classList.add('hidden');
    document.getElementById('tab-bookings').classList.add('hidden');
    document.getElementById('tab-payments').classList.add('hidden');
    document.getElementById('tab-' + tab).classList.remove('hidden');
    if (tab === 'bookings') loadBookings();
    if (tab === 'payments') loadPayments();
}

// ========== ZONES & SPOTS ==========
async function loadZones() {
    const r = await fetch(API + '/api/parking/zones');
    const d = await r.json();
    const list = document.getElementById('zonesList');
    if (d.zones && d.zones.length > 0) {
        list.innerHTML = d.zones.map(z => `
            <div style="padding:12px;margin:8px 0;background:var(--bg);border-radius:8px;cursor:pointer;border:1px solid var(--border)"
                 onclick="selectZone('${z.id}', '${z.name}')">
                <strong>${z.name}</strong><br>
                <span class="text-muted">${z.address}</span><br>
                <span class="text-muted">Мест: ${z.total_spots}</span>
            </div>
        `).join('');
        selectZone(d.zones[0].id, d.zones[0].name);
    } else {
        list.innerHTML = '<span class="text-muted">Нет зон</span>';
    }
}

async function selectZone(zoneId, zoneName) {
    selectedZone = zoneId;
    const r = await fetch(API + '/api/parking/spots?zone_id=' + zoneId);
    const d = await r.json();
    const list = document.getElementById('spotsList');
    if (d.spots && d.spots.length > 0) {
        list.innerHTML = `
            <p style="margin-bottom:10px"><strong>${zoneName}</strong></p>
            <div class="parking-grid">
                ${d.spots.map(s => `
                    <div class="spot ${s.status}" onclick="${s.status === 'free' ? 'openBooking(\'' + s.id + '\', \'' + s.spot_number + '\', ' + s.price_per_hour + ')' : ''}">
                        <strong>${s.spot_number}</strong><br>
                        ${s.price_per_hour} ₸/ч<br>
                        <small>${s.status === 'free' ? '✅ Свободно' : s.status === 'occupied' ? '🚗 Занято' : '📌 Резерв'}</small>
                    </div>
                `).join('')}
            </div>
        `;
    } else {
        list.innerHTML = '<span class="text-muted">Нет мест</span>';
    }
}

// ========== BOOKING ==========
function openBooking(spotId, spotNumber, price) {
    if (!currentUser) { toast('Сначала войдите!', 'error'); return; }
    selectedSpot = { id: spotId, number: spotNumber, price: price };
    document.getElementById('bookingSpot').value = spotNumber;
    document.getElementById('bookingPrice').value = price + ' ₸/час';
    
    const now = new Date();
    now.setMinutes(0, 0, 0);
    const end = new Date(now.getTime() + 2 * 3600000);
    document.getElementById('bookingStart').value = now.toISOString().slice(0,16);
    document.getElementById('bookingEnd').value = end.toISOString().slice(0,16);
    updateTotal();
    document.getElementById('bookingModal').classList.add('show');
}

function updateTotal() {
    const start = new Date(document.getElementById('bookingStart').value);
    const end = new Date(document.getElementById('bookingEnd').value);
    const hours = (end - start) / 3600000;
    if (hours > 0 && selectedSpot) {
        document.getElementById('bookingTotal').value = (hours * selectedSpot.price).toFixed(0) + ' ₸';
    }
}
document.getElementById('bookingStart').addEventListener('change', updateTotal);
document.getElementById('bookingEnd').addEventListener('change', updateTotal);

function closeBookingModal() { document.getElementById('bookingModal').classList.remove('show'); }

async function confirmBooking() {
    if (!currentUser) { alert("Сначала войдите!"); return; }
    const r = await fetch(API + '/api/parking/booking', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            user_id: currentUser.id,
            spot_id: selectedSpot.id,
            start_time: new Date(document.getElementById('bookingStart').value).toISOString(),
            end_time: new Date(document.getElementById('bookingEnd').value).toISOString()
        })
    });
    const d = await r.json();
    if (d.booking) {
        toast('Бронирование создано! Сумма: ' + d.booking.total_price + ' ₸', 'success');
        closeBookingModal();
        selectZone(selectedZone, '');
    } else {
        toast(d.error || 'Ошибка бронирования', 'error');
    }
}

// ========== MY BOOKINGS ==========
async function loadBookings() {
    if (!currentUser) return;
    const r = await fetch(API + '/api/parking/booking/user?user_id=' + currentUser.id);
    const d = await r.json();
    const body = document.getElementById('bookingsBody');
    if (d.bookings && d.bookings.length > 0) {
        body.innerHTML = d.bookings.map(b => `
            <tr>
                <td>${b.id.substring(0,8)}...</td>
                <td>${b.spot_id}</td>
                <td>${new Date(b.start_time.seconds*1000).toLocaleString()}</td>
                <td>${new Date(b.end_time.seconds*1000).toLocaleString()}</td>
                <td>${b.total_price} ₸</td>
                <td><span class="status ${b.status}">${b.status}</span></td>
                <td>${b.status === 'active' ? `<button class="btn btn-danger btn-sm" onclick="cancelBooking('${b.id}')">Отменить</button>` : ''}</td>
            </tr>
        `).join('');
    } else {
        body.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Нет бронирований</td></tr>';
    }
}

async function cancelBooking(id) {
    const r = await fetch(API + '/api/parking/booking/cancel?id=' + id);
    const d = await r.json();
    if (d.success) { toast('Бронирование отменено'); loadBookings(); }
    else { toast('Ошибка отмены', 'error'); }
}

// ========== PAYMENTS ==========
async function loadPayments() {
    // Просто заглушка - API payment/get по ID, список не поддерживается
    document.getElementById('paymentsBody').innerHTML = `
        <tr><td colspan="6" class="text-center text-muted">
            Для просмотра платежа введите ID: <input id="payIdInput" placeholder="Payment ID" style="width:300px;margin-left:10px">
            <button class="btn btn-accent btn-sm" onclick="getPaymentById()" style="margin-left:10px">Найти</button>
            <div id="payDetail" style="margin-top:10px"></div>
        </td></tr>
    `;
}

async function getPaymentById() {
    const id = document.getElementById('payIdInput').value;
    const r = await fetch(API + '/api/payment/get?id=' + id);
    const d = await r.json();
    document.getElementById('payDetail').innerHTML = '<pre>' + JSON.stringify(d, null, 2) + '</pre>';
}

// ========== INIT ==========
loadZones();
</script>
</body>
</html>
